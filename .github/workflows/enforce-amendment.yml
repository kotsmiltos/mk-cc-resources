name: Enforce Amendment Protocol

on:
  pull_request:
    branches: [main]

jobs:
  check-amendments:
    name: Validate amendment coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run amendment validator
        env:
          CI: "true"
        run: python scripts/enforce_amendment_protocol.py --ci
