# Project Vocabulary — maps user terms to domain-specific concepts
# Updated automatically when terms are clarified during conversation.
#
# When the user says "board", which board? When they say "grid", which grid?
# This file resolves ambiguity so Claude doesn't have to ask twice.
#
# Format:
#   Single meaning:
#     term:
#       means: "what it refers to"
#       files: "where to find it in the codebase"
#
#   Multiple meanings (disambiguated by context):
#     term:
#       - context: "keywords that suggest this meaning"
#         means: "what it refers to in this context"
#         files: "relevant file paths"
#       - context: "keywords that suggest the other meaning"
#         means: "what it refers to in this other context"
#         files: "relevant file paths"

terms: {}
