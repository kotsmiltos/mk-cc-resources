# task-spec.schema.yaml — THE canonical task-spec shape. Single source of truth.
#
# Consumed by:
#   - bin/essense-flow-tools.cjs `task-spec-write` validator (lib/schema-validate.cjs)
#   - scripts/render-schema-docs.cjs — renders the shape blocks in
#     skills/architect/templates/sub-architect-brief.md,
#     skills/architect/templates/task-spec.md,
#     agents/essense-flow-sub-architect.md, agents/essense-flow-task-agent.md
#
# Editing rules:
#   - Edit THIS file, then run `npm run render-schemas`. Never hand-edit the
#     rendered blocks — test/schema-docs-drift.test.cjs fails on divergence.
#   - Field order here IS the canonical document order and validation order.
#   - `expected` strings are part of the CLI error-message contract; change
#     only with a reason recorded in RELEASE-NOTES.

schema_version: 1
artifact: task-spec
doc: >
  One closed task spec. Produced by /architect (master writes via
  `task-spec-write` after sub-architects return specs as YAML text).
  Consumed verbatim by /build task agents as their brief.

fields:
  schema_version:
    type: int
    const: 1
    required: true
    expected: 'int frozen at 1'
    example: 1
    placeholder: '1'
    doc: frozen at 1

  task_id:
    type: string
    pattern: '^[A-Z]+-[A-Za-z0-9_-]+$'
    required: true
    expected: 'string matching /^[A-Z]+-[A-Za-z0-9_-]+$/'
    example: 'T-001'
    placeholder: '{{task_id}}'
    doc: >
      uppercase prefix + hyphen + slug. T-001, P-parser-01, D-ch01-data are
      all valid. Widened 2026-06-07 from ^T-\d{3,}$ — real architect runs use
      module-prefixed id schemes.

  module:
    type: string
    required: false
    example: 'parser'
    placeholder: '{{module_name}}'
    doc: OPTIONAL but recommended — module name echoed from the brief

  goal:
    type: string
    nonempty: true
    required: true
    expected: 'non-empty string'
    example: 'One sentence stating what changes.'
    placeholder: '"{{goal}}"'
    doc: one sentence stating what changes

  requirements_traced:
    type: array
    required: true
    items: { type: string }
    expected: 'array of strings (FR-* / NFR-* IDs)'
    example: ['FR-1', 'NFR-2']
    placeholder: '{{requirements_traced}}'
    doc: requirement IDs from the req_slice this task answers

  file_write_contract:
    type: object
    required: true
    expected: 'object with `paths` array'
    example:
      paths: ['src/parser.js', 'tests/parser.test.js']
      out_of_contract: flag-not-block
      scratch_space: []
    placeholder: |-
      paths: {{paths}}
      out_of_contract: {{out_of_contract}}
      scratch_space: {{scratch_space}}
    doc: >
      which files this task creates/modifies. Out-of-contract writes are
      flagged by the build runner's disk verification, not blocked.
    fields:
      paths:
        type: array
        items: { type: string }
        required: true
        report_as_parent: true
        doc: relative paths this task may create/modify
      out_of_contract:
        type: string
        enum: [forbidden, flag-not-block]
        required: false
        doc: 'how the runner treats writes outside `paths` (default: flag-not-block)'
      scratch_space:
        type: array
        items: { type: string }
        required: false
        doc: >
          transient-write prefixes excluded from drift accounting. Entries:
          the sentinel "os.tmpdir()" (resolved by the runner at verify time)
          or an explicit absolute path prefix. Omit or [] when the task needs
          zero transient state. Exists because a test agent once destroyed
          shared fixtures via teardown writes its contract never covered —
          transient writes must be declared, everything else is drift.

  behavioral_pseudocode:
    type: string
    required: true
    nullable_iff: { field: agency_level, equals: open }
    expected: 'string (null only allowed when agency_level == open)'
    example: |
      1. read input file
      2. parse records, skip malformed lines with a logged warning
      3. return parsed array
    placeholder: |-
      |
      {{behavioral_pseudocode}}
    doc: >
      numbered procedural steps. null ONLY when agency_level is `open`
      (you genuinely want the build agent's judgment).

  test_completion_contract:
    type: array
    required: true
    min_items: 0
    items: { type: object, has_keys: [id, description, check] }
    item_observed: item
    expected: 'array of objects each with id, description, check'
    example:
      - id: AC-1
        description: 'parser returns [] for empty input'
        check: { type: test, spec: 'tests/parser.test.js' }
    placeholder: '{{test_completion_contract}}'
    doc: >
      acceptance criteria. check.type one of test | grep | file_exists |
      manual; check.spec is type-specific. Build honors the sprint test
      mode: must-pass (run + pass before return) or author-only (author
      tests, do not run).

  dependencies:
    type: array
    required: true
    items: { type: string }
    expected: 'array of strings (task-id refs)'
    example: ['T-002']
    placeholder: '{{dependencies}}'
    doc: >
      build-ORDERING refs only — task-ids that must complete before this one
      runs. NOT the interface contract (that is `consumes`). May be empty.

  exposes:
    type: array
    required: false
    items: { type: string }
    expected: 'array of strings naming the public surface this unit offers'
    example:
      - 'parseLog(buffer) -> { records: Record[], errors: ParseError[] }'
      - 'class LogReader — open(path), next() -> Record | null, close()'
    placeholder: '{{exposes}}'
    doc: >
      OPTIONAL but strongly recommended — the unit's public contract: the
      functions / types / endpoints and their shapes that callers may depend on.
      Everything NOT listed here is private and may change without notice. This
      is the decoupling boundary on the provider side: callers bind to this
      surface, never to internals. The `coupling` review lens checks that nothing
      outside this surface is depended on across a boundary.

  consumes:
    type: array
    required: false
    items: { type: string }
    expected: 'array of strings naming interfaces this unit depends on, by contract'
    example:
      - 'storage.put(key, bytes) -> void   (provided by module: storage)'
      - 'clock.now() -> epochMs            (provided by module: platform)'
    placeholder: '{{consumes}}'
    doc: >
      OPTIONAL — the interfaces this unit depends on, each named by the CONTRACT
      it calls (the shape), not the concrete provider or its internals. Distinct
      from `dependencies` (build-ordering task-ids). Depend on the named shape and
      nothing past it; swapping a provider for another implementation of the same
      contract must not require editing this unit. The `coupling` review lens
      flags any cross-boundary reach-in not expressible as one of these contracts.

  agency_level:
    type: string
    enum: [prescribed, guided, open]
    required: true
    example: 'guided'
    placeholder: '{{agency_level}}'
    doc: >
      prescribed — pseudocode covers every requirement; use only when the
      implementation shape is non-negotiable. guided (default) — clear goal +
      key constraints; build agent designs within bounds. open — build agent
      designs freely.

  agency_rationale:
    type: string
    nonempty: true
    required: true
    expected: 'non-empty string'
    example: 'Parsing approach is flexible; output contract is fixed by FR-1.'
    placeholder: '"{{agency_rationale}}"'
    doc: why this agency level fits this work
