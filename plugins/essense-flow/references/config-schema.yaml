$schema: "https://json-schema.org/draft/2020-12/schema"
title: essense-flow pipeline configuration
description: Schema for .pipeline/config.yaml — validates all pipeline settings.
type: object

required:
  - schema_version
  - token_budgets
  - timeouts

additionalProperties: false

properties:
  schema_version:
    type: integer
    description: Configuration schema version for forward compatibility.
    default: 1
    minimum: 1

  pipeline:
    type: object
    description: Project-level metadata populated during init.
    additionalProperties: false
    properties:
      name:
        type: string
        description: Project name (set during init).
        default: ""
      created_at:
        type: string
        description: ISO-8601 timestamp of project creation (set during init).
        default: ""

  token_budgets:
    type: object
    description: Token limits that govern brief assembly and context injection.
    additionalProperties: false
    required:
      - brief_ceiling
      - section_max
      - identity_max
      - constraints_max
      - injection_ceiling
      - safety_margin_pct
    properties:
      brief_ceiling:
        type: integer
        description: Max tokens for any assembled agent brief.
        default: 12000
        minimum: 1
      section_max:
        type: integer
        description: Max tokens for any single brief section.
        default: 4000
        minimum: 1
      identity_max:
        type: integer
        description: Max tokens for identity block.
        default: 200
        minimum: 1
      constraints_max:
        type: integer
        description: Max tokens for constraints block.
        default: 500
        minimum: 1
      injection_ceiling:
        type: integer
        description: Max tokens for context hook injection.
        default: 10000
        minimum: 1
      max_brief_ceiling:
        type: integer
        description: Hard cap on adaptive brief scaling.
        default: 100000
        minimum: 1
      safety_margin_pct:
        type: integer
        description: Buffer percentage subtracted from ceilings.
        default: 10
        minimum: 0
        maximum: 100

  timeouts:
    type: object
    description: Wall-clock limits for hooks and subagent execution.
    additionalProperties: false
    required:
      - hook_ms
      - agent_ms
    properties:
      hook_ms:
        type: integer
        description: Max milliseconds for any hook script.
        default: 5000
        minimum: 1
      agent_ms:
        type: integer
        description: Max milliseconds for any subagent.
        default: 300000
        minimum: 1

  overflow:
    type: object
    description: Guards against runaway decomposition and oversized files.
    additionalProperties: false
    properties:
      file_lines_backstop:
        type: integer
        description: File size backstop in lines (secondary signal).
        default: 300
        minimum: 1
      max_decomposition_depth:
        type: integer
        description: Max recursive decomposition before escalation.
        default: 5
        minimum: 1

  quorum:
    type: object
    description: Quorum rules for each pipeline phase.
    additionalProperties: false
    properties:
      research:
        type: string
        description: Quorum requirement for research perspective agents.
        default: "all"
        enum:
          - "all"
          - "n-1"
      architecture_perspective:
        type: string
        description: Quorum requirement for architecture perspective agents.
        default: "n-1"
        enum:
          - "all"
          - "n-1"
      architecture_decomposition:
        type: string
        description: Quorum requirement for architecture decomposition agents.
        default: "all"
        enum:
          - "all"
          - "n-1"
      build:
        type: string
        description: Quorum requirement for build agents.
        default: "all"
        enum:
          - "all"
          - "n-1"
      review:
        type: string
        description: Quorum requirement for review agents.
        default: "n-1"
        enum:
          - "all"
          - "n-1"

  validation:
    type: object
    description: Write-time validation settings.
    additionalProperties: false
    properties:
      yaml_validate_paths:
        type: array
        description: Paths to validate on write (D6).
        default:
          - ".pipeline/"
          - "context/"
        items:
          type: string
