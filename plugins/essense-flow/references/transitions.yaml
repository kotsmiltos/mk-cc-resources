# essense-flow state machine transition table
# Defines every legal state transition, its trigger, preconditions, and effects.
# Referenced by state-management hooks to validate phase changes.
schema_version: 1

# Valid phases:
#   idle, eliciting, research, triaging, requirements-ready, architecture,
#   decomposing, sprinting, sprint-complete, reviewing, complete

transitions:
  idle-to-eliciting:
    from: "idle"
    to: "eliciting"
    triggered_by: "elicit-skill"
    requires: null
    auto_advance: false
    fields_changed:
      - "pipeline.phase"
      - "elicitation.status"
      - "elicitation.started_at"
      - "last_updated"

  eliciting-to-eliciting:
    from: "eliciting"
    to: "eliciting"
    triggered_by: "elicit-skill"
    requires: null
    auto_advance: false
    fields_changed:
      - "elicitation.current_round"
      - "elicitation.explored"
      - "last_updated"

  eliciting-to-idle:
    from: "eliciting"
    to: "idle"
    triggered_by: "elicit-skill"
    requires: null
    auto_advance: false
    fields_changed:
      - "pipeline.phase"
      - "elicitation.status"
      - "elicitation.completed_at"
      - "phases_completed.elicitation"
      - "last_updated"

  idle-to-research:
    from: "idle"
    to: "research"
    triggered_by: "research-skill"
    requires: null
    auto_advance: false
    fields_changed:
      - "pipeline.phase"
      - "last_updated"

  research-to-triaging:
    from: "research"
    to: "triaging"
    triggered_by: "research-skill"
    requires: null
    auto_advance: true
    fields_changed:
      - "pipeline.phase"
      - "phases_completed.research"
      - "last_updated"

  research-to-requirements-ready:
    from: "research"
    to: "requirements-ready"
    triggered_by: "research-skill"
    requires: null
    auto_advance: false
    fields_changed:
      - "pipeline.phase"
      - "last_updated"

  triaging-to-eliciting:
    from: "triaging"
    to: "eliciting"
    triggered_by: "triage-skill"
    requires: null
    auto_advance: false
    fields_changed:
      - "pipeline.phase"
      - "last_updated"

  triaging-to-requirements-ready:
    from: "triaging"
    to: "requirements-ready"
    triggered_by: "triage-skill"
    requires: null
    auto_advance: false
    fields_changed:
      - "pipeline.phase"
      - "last_updated"

  triaging-to-research:
    from: "triaging"
    to: "research"
    triggered_by: "triage-skill"
    requires: null
    auto_advance: true
    fields_changed:
      - "pipeline.phase"
      - "last_updated"

  triaging-to-architecture:
    from: "triaging"
    to: "architecture"
    triggered_by: "triage-skill"
    requires: null
    auto_advance: false
    fields_changed:
      - "pipeline.phase"
      - "last_updated"

  triaging-to-verifying:
    from: "triaging"
    to: "verifying"
    triggered_by: "triage-skill"
    requires: "SPEC.md exists at .pipeline/elicitation/SPEC.md"
    auto_advance: false
    fields_changed:
      - "pipeline.phase"
      - "last_updated"

  verifying-to-complete:
    from: "verifying"
    to: "complete"
    triggered_by: "verify-skill"
    requires: "VERIFICATION-REPORT.md exists with completion_status: complete and no CONFIRMED gaps"
    auto_advance: true
    fields_changed:
      - "pipeline.phase"
      - "phases_completed.verify"
      - "last_updated"

  verifying-to-eliciting:
    from: "verifying"
    to: "eliciting"
    triggered_by: "verify-skill"
    requires: "VERIFICATION-REPORT.md contains CONFIRMED spec drift items"
    auto_advance: false
    fields_changed:
      - "pipeline.phase"
      - "last_updated"

  verifying-to-architecture:
    from: "verifying"
    to: "architecture"
    triggered_by: "verify-skill"
    requires: "VERIFICATION-REPORT.md contains CONFIRMED missing implementation items"
    auto_advance: false
    fields_changed:
      - "pipeline.phase"
      - "last_updated"

  requirements-ready-to-architecture:
    from: "requirements-ready"
    to: "architecture"
    triggered_by: "architecture-skill"
    requires: ".pipeline/requirements/REQ.md exists"
    auto_advance: false
    fields_changed:
      - "pipeline.phase"
      - "last_updated"

  architecture-to-sprinting:
    from: "architecture"
    to: "sprinting"
    triggered_by: "architecture-skill"
    requires: "task specs exist for current sprint"
    auto_advance: true
    fields_changed:
      - "pipeline.phase"
      - "pipeline.sprint"
      - "phases_completed.architecture"
      - "last_updated"

  architecture-to-decomposing:
    from: "architecture"
    to: "decomposing"
    triggered_by: "architecture-skill"
    requires: null
    auto_advance: false
    fields_changed:
      - "pipeline.phase"
      - "last_updated"

  decomposing-to-decomposing:
    from: "decomposing"
    to: "decomposing"
    triggered_by: "architecture-skill"
    requires: null
    auto_advance: false
    fields_changed:
      - "pipeline.wave"
      - "last_updated"

  decomposing-to-sprinting:
    from: "decomposing"
    to: "sprinting"
    triggered_by: "architecture-skill"
    requires: null
    auto_advance: true
    fields_changed:
      - "pipeline.phase"
      - "pipeline.sprint"
      - "phases_completed.architecture"
      - "last_updated"

  sprinting-to-sprint-complete:
    from: "sprinting"
    to: "sprint-complete"
    triggered_by: "build-skill"
    requires: null
    auto_advance: true
    fields_changed:
      - "pipeline.phase"
      - "pipeline.task_in_progress"
      - "last_updated"

  sprint-complete-to-reviewing:
    from: "sprint-complete"
    to: "reviewing"
    triggered_by: "review-skill"
    requires: "completion report exists for current sprint"
    auto_advance: true
    fields_changed:
      - "pipeline.phase"
      - "last_updated"

  reviewing-to-triaging:
    from: "reviewing"
    to: "triaging"
    triggered_by: "review-skill"
    requires: "QA report exists for current sprint"
    auto_advance: true
    fields_changed:
      - "pipeline.phase"
      - "last_updated"

  # NOTE: triaging -> complete is NOT a valid transition.
  # All-acceptable findings route triaging -> verifying first.
  # Only verifying -> complete is allowed (requires zero CONFIRMED gaps).

  complete-to-idle:
    from: "complete"
    to: "idle"
    triggered_by: "orchestrator"
    requires: null
    auto_advance: false
    fields_changed:
      - "pipeline.phase"
      - "pipeline.sprint"
      - "pipeline.wave"
      - "pipeline.task_in_progress"
      - "next_action"
      - "last_updated"
