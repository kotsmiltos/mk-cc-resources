# essense-flow state machine — the law.
#
# Every phase change goes through one of these transitions. lib/state.js
# rejects illegal transitions at write time. Skills propose; the state
# machine grants.
#
# No transition has a resource cap or budget gate. `requires` declares
# concrete artifact preconditions only — never quotas, budgets, counts.
#
# Phases:
#   idle, eliciting, research, triaging, requirements-ready, architecture,
#   decomposing, sprinting, organizing, sprint-complete, glossarying,
#   reviewing, verifying, complete

schema_version: 1

phases:
  - idle
  - eliciting
  - research
  - triaging
  - requirements-ready
  - architecture
  - decomposing
  - sprinting
  - organizing
  - sprint-complete
  - glossarying
  - reviewing
  - verifying
  - complete

# Phases where the user is the actor — autopilot must halt here.
# organizing is propose-with-confirm (every consolidation needs user OK);
# glossarying gates on the agent-count estimate confirm (lock row 16).
# Both are therefore human gates.
human_gates:
  - idle
  - eliciting
  - organizing
  - glossarying
  - verifying

terminal:
  - complete

transitions:

  # --- entry / elicit ---

  idle-to-eliciting:
    from: idle
    to: eliciting
    triggered_by: elicit-skill
    requires: null
    auto_advance: false
    fields_changed: [phase, elicitation.started_at, last_updated]

  eliciting-to-eliciting:
    from: eliciting
    to: eliciting
    triggered_by: elicit-skill
    requires: null
    auto_advance: false
    fields_changed: [elicitation.round, last_updated]

  eliciting-to-research:
    from: eliciting
    to: research
    triggered_by: elicit-skill
    requires: ".pipeline/elicitation/SPEC.md exists with status: build-ready"
    auto_advance: true
    fields_changed: [phase, elicitation.completed_at, last_updated]

  eliciting-to-architecture:
    from: eliciting
    to: architecture
    triggered_by: elicit-skill
    requires: ".pipeline/elicitation/SPEC.md exists with status: build-ready AND user routed around research"
    auto_advance: false
    fields_changed: [phase, elicitation.completed_at, last_updated]

  # --- research ---

  research-to-research:
    from: research
    to: research
    triggered_by: research-skill
    requires: null
    auto_advance: false
    fields_changed: [research.round, last_updated]

  research-to-triaging:
    from: research
    to: triaging
    triggered_by: research-skill
    requires: ".pipeline/requirements/REQ.md exists"
    auto_advance: true
    fields_changed: [phase, research.completed_at, last_updated]

  # --- triage (the sorting hat) ---

  triaging-to-eliciting:
    from: triaging
    to: eliciting
    triggered_by: triage-skill
    requires: "triage routed item back for design intent addendum"
    auto_advance: false
    fields_changed: [phase, last_updated]

  triaging-to-research:
    from: triaging
    to: research
    triggered_by: triage-skill
    requires: "triage routed item back for further analysis"
    auto_advance: false
    fields_changed: [phase, last_updated]

  triaging-to-requirements-ready:
    from: triaging
    to: requirements-ready
    triggered_by: triage-skill
    requires: "all triage dispositions resolved; no upstream routes"
    auto_advance: true
    fields_changed: [phase, triage.completed_at, last_updated]

  triaging-to-architecture:
    from: triaging
    to: architecture
    triggered_by: triage-skill
    requires: "triage routed item to architecture"
    auto_advance: false
    fields_changed: [phase, last_updated]

  triaging-to-verifying:
    from: triaging
    to: verifying
    triggered_by: triage-skill
    requires: "post-build triage routed all items to spec-compliance audit"
    auto_advance: false
    fields_changed: [phase, last_updated]

  # --- architecture ---

  requirements-ready-to-architecture:
    from: requirements-ready
    to: architecture
    triggered_by: architect-skill
    requires: ".pipeline/requirements/REQ.md exists"
    auto_advance: false
    fields_changed: [phase, last_updated]

  architecture-to-decomposing:
    from: architecture
    to: decomposing
    triggered_by: architect-skill
    requires: null
    auto_advance: false
    fields_changed: [phase, last_updated]

  decomposing-to-decomposing:
    from: decomposing
    to: decomposing
    triggered_by: architect-skill
    requires: null
    auto_advance: false
    fields_changed: [decomposition.round, last_updated]

  decomposing-to-architecture:
    from: decomposing
    to: architecture
    triggered_by: architect-skill
    requires: "open design decision surfaced during decomposition"
    auto_advance: false
    fields_changed: [phase, last_updated]

  architecture-to-sprinting:
    from: architecture
    to: sprinting
    triggered_by: architect-skill
    requires: ".pipeline/architecture/sprints/<n>/manifest.yaml exists with all task specs closed"
    auto_advance: true
    fields_changed: [phase, sprint, architecture.completed_at, last_updated]

  decomposing-to-sprinting:
    from: decomposing
    to: sprinting
    triggered_by: architect-skill
    requires: ".pipeline/architecture/sprints/<n>/manifest.yaml exists with all task specs closed"
    auto_advance: true
    fields_changed: [phase, sprint, architecture.completed_at, last_updated]

  # --- build ---

  sprinting-to-sprinting:
    from: sprinting
    to: sprinting
    triggered_by: build-skill
    requires: null
    auto_advance: false
    fields_changed: [wave, last_updated]

  sprinting-to-sprint-complete:
    from: sprinting
    to: sprint-complete
    triggered_by: build-skill
    requires: ".pipeline/build/sprints/<n>/SPRINT-REPORT.md exists with all tasks resolved"
    auto_advance: true
    fields_changed: [phase, last_updated]

  # A paused sprint (crashed/blocked task agents, mid-sprint findings) routes
  # through triage — the sorting hat decides which upstream phase the blocker
  # needs. This edge was always documented ("sprint pauses for triage" in the
  # task-agent quorum contract) but never legal; its absence forced /heal +
  # force-set workarounds for ordinary mid-sprint amendments.
  sprinting-to-triaging:
    from: sprinting
    to: triaging
    triggered_by: build-skill
    requires: "sprint paused: >=1 completion record with status crashed | blocked | partial-with-surfaced-concern, or user-initiated pause"
    auto_advance: false
    fields_changed: [phase, last_updated]

  # --- organize (optional, post-architect pre-build; spec-mode DRY pass) ---

  sprinting-to-organizing:
    from: sprinting
    to: organizing
    triggered_by: organize-skill
    requires: ".pipeline/architecture/sprints/<n>/manifest.yaml exists"
    auto_advance: false
    fields_changed: [phase, last_updated]

  organizing-to-organizing:
    from: organizing
    to: organizing
    triggered_by: organize-skill
    requires: null
    auto_advance: false
    fields_changed: [organize.round, last_updated]

  organizing-to-sprinting:
    from: organizing
    to: sprinting
    triggered_by: organize-skill
    requires: ".pipeline/architecture/ORGANIZE-REPORT.md exists"
    auto_advance: false
    fields_changed: [phase, last_updated]

  # --- glossary (optional, post-build; code-mode DRY audit) ---

  sprint-complete-to-glossarying:
    from: sprint-complete
    to: glossarying
    triggered_by: glossary-skill
    requires: ".pipeline/build/sprints/<n>/SPRINT-REPORT.md exists"
    auto_advance: false
    fields_changed: [phase, last_updated]

  glossarying-to-glossarying:
    from: glossarying
    to: glossarying
    triggered_by: glossary-skill
    requires: null
    auto_advance: false
    fields_changed: [glossary.round, last_updated]

  glossarying-to-sprint-complete:
    from: glossarying
    to: sprint-complete
    triggered_by: glossary-skill
    requires: ".pipeline/glossary/GLOSSARY.yaml exists"
    auto_advance: false
    fields_changed: [phase, last_updated]

  # A completed sprint may be amended: architect re-enters, patches the
  # affected task specs against the new requirement, and repacks (either an
  # in-place amendment of sprint <n> or a follow-up sprint <n+1> from the
  # surviving dependency graph). Mirrors the verifying-to-architecture
  # precedent — finished work routing back to design is a normal loop, not
  # an illegal state.
  sprint-complete-to-architecture:
    from: sprint-complete
    to: architecture
    triggered_by: architect-skill
    requires: "user-approved amendment: new/changed requirement names the sprint outputs it affects"
    auto_advance: false
    fields_changed: [phase, last_updated]

  # --- review ---

  sprint-complete-to-reviewing:
    from: sprint-complete
    to: reviewing
    triggered_by: review-skill
    requires: ".pipeline/build/sprints/<n>/SPRINT-REPORT.md exists"
    auto_advance: true
    fields_changed: [phase, last_updated]

  reviewing-to-triaging:
    from: reviewing
    to: triaging
    triggered_by: review-skill
    requires: ".pipeline/review/sprints/<n>/QA-REPORT.md exists with confirmed_unacknowledged_criticals > 0"
    auto_advance: true
    fields_changed: [phase, last_updated]

  reviewing-to-verifying:
    from: reviewing
    to: verifying
    triggered_by: review-skill
    requires: ".pipeline/review/sprints/<n>/QA-REPORT.md exists with confirmed_unacknowledged_criticals == 0"
    auto_advance: false
    fields_changed: [phase, last_updated]

  # --- verify (top-down spec compliance) ---

  verifying-to-complete:
    from: verifying
    to: complete
    triggered_by: verify-skill
    requires: ".pipeline/verify/VERIFICATION-REPORT.md exists with confirmed_gaps == 0"
    auto_advance: true
    fields_changed: [phase, verify.completed_at, last_updated]

  verifying-to-eliciting:
    from: verifying
    to: eliciting
    triggered_by: verify-skill
    requires: "VERIFICATION-REPORT.md confirms spec drift requiring elicit addendum"
    auto_advance: false
    fields_changed: [phase, last_updated]

  verifying-to-architecture:
    from: verifying
    to: architecture
    triggered_by: verify-skill
    requires: "VERIFICATION-REPORT.md confirms missing implementation"
    auto_advance: false
    fields_changed: [phase, last_updated]

  verifying-to-triaging:
    from: verifying
    to: triaging
    triggered_by: verify-skill
    requires: "VERIFICATION-REPORT.md surfaces items needing categorization"
    auto_advance: false
    fields_changed: [phase, last_updated]

  # --- terminal cycle ---

  complete-to-idle:
    from: complete
    to: idle
    triggered_by: orchestrator
    requires: null
    auto_advance: false
    fields_changed: [phase, sprint, wave, last_updated]

# ----------------------------------------------------------------------------
# per_skill_skip_threshold — per-skill dispatch floors for the Skip-IFF gate.
#
# Single lookup source for the getSkillSkipThreshold(skill) helper in
# lib/cursor-schema.cjs. No fallback constants anywhere — this is the
# canonical threshold table; the helper fails loud on a missing entry.
# Amendments require a closed decision entry in the project's decisions
# log. rule_id values are stable identifiers consumed verbatim by the
# CLI and its tests — do not rename them.
#
# Propagation requirement (carries to readers of this block):
#   - Limits-awareness: Claude drifts, loses context, finishes prematurely,
#     defers, takes shortcuts. Re-read when uncertain. Preserve specifics.
#   - Positive mindset: every gap solvable. Find the way by working carefully.
#   - Quality ownership: this work matters. Take ownership.
#   - Propagation requirement: every descendant artifact must carry these
#     same four instructions.
# ----------------------------------------------------------------------------

per_skill_skip_threshold:
  architect:
    threshold: 1
    # threshold = decomposition.modules.length (one sub-architect dispatch
    # per module); encoded as 1 here means "≥ module count" with module
    # count supplied at predicate-evaluation time via cursorState. The
    # literal value '1' is a structural placeholder — the rule is
    # "observed >= max(threshold, decomposition.modules.length)".
    rule_id: dispatch-floor
    rule_phrase: 'with sufficient sub-architect dispatch'
    rule_quote_required: true
    skip_iff_substance: |
      modules.length == 1 AND scope == 'condensed' AND
      user ratified the skip

  review:
    threshold: 6
    rule_id: dispatch-floor
    rule_phrase: 'with sufficient lens dispatch'
    rule_quote_required: true
    skip_iff_substance: |
      task_count <= 2 OR a rule-allowed substance quote is cited

  verify:
    threshold: 1
    # threshold = items_total (one verifier dispatch per extracted item);
    # structural placeholder like architect.threshold above.
    rule_id: dispatch-floor
    rule_phrase: 'with sufficient verifier dispatch'
    rule_quote_required: true
    skip_iff_substance: |
      items_total == 0 OR a rule-allowed substance quote is cited
