# Phase → recommended next slash command.
# Read by the next-step hook to surface the cue. Suggestion only —
# the user can ignore, run something else, or run nothing.

schema_version: 1

phases:

  idle:
    next: /elicit
    description: "Start a new pipeline cycle by eliciting the project pitch into a build-ready spec."
    inputs: []

  eliciting:
    next: /elicit
    description: "Resume elicitation — continue refining SPEC.md until build-ready."
    inputs: [".pipeline/elicitation/SPEC.md"]

  research:
    next: /research
    description: "Resume research — perspective agents synthesize REQ.md."
    inputs: [".pipeline/elicitation/SPEC.md"]

  triaging:
    next: /triage
    description: "Triage open items — categorize gaps and findings, route to upstream phase."
    inputs:
      - ".pipeline/elicitation/SPEC.md"
      - ".pipeline/requirements/REQ.md"

  requirements-ready:
    next: /architect
    description: "Decompose requirements into closed task specs and a sprint manifest."
    inputs:
      - ".pipeline/elicitation/SPEC.md"
      - ".pipeline/requirements/REQ.md"

  architecture:
    next: /architect
    description: "Resume architecture — close decisions, decompose to leaves, package task specs."
    inputs: [".pipeline/architecture/ARCH.md"]

  decomposing:
    next: /architect
    description: "Resume decomposition wave — classify nodes as leaves or split further."
    inputs: [".pipeline/architecture/ARCH.md"]

  sprinting:
    next: /build
    description: "Execute the sprint — dispatch task agents in dependency-ordered waves."
    inputs: [".pipeline/architecture/sprints/<n>/manifest.yaml"]

  sprint-complete:
    next: /review
    description: "Review the sprint output — adversarial agents hunt bugs and drift with path evidence."
    inputs: [".pipeline/build/sprints/<n>/SPRINT-REPORT.md"]

  reviewing:
    next: /review
    description: "Resume review — finish validating findings against disk."
    inputs: [".pipeline/review/sprints/<n>/QA-REPORT.md"]

  verifying:
    next: /verify
    description: "Top-down spec compliance audit — every spec decision verified against implementation."
    inputs:
      - ".pipeline/elicitation/SPEC.md"
      - ".pipeline/architecture/ARCH.md"

  complete:
    next: /status
    description: "Cycle complete. Run /status to inspect, or /init to begin a new cycle."
    inputs: [".pipeline/state.yaml"]
