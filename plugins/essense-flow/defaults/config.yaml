# essense-flow per-project config.
#
# No budgets. No concurrency caps. No wave counts.
# Quality-gate thresholds live here only when they are evidence-policy
# decisions, not throughput governors.

schema_version: 1

# Evidence policy — quality gates, not resource gates.
evidence:
  # A finding's verbatim quote must be at least this many characters.
  # Shorter quotes are too ambiguous to validate against disk.
  # Quality gate, not throughput cap.
  min_quote_length: 20

# Hook posture.
hooks:
  context_inject:
    enabled: true
  next_step:
    enabled: true

# Discovery — heal phase posture when picking up prior work.
discovery:
  prior_artifact_paths:
    - "SPEC.md"
    - "REQ.md"
    - "ARCH.md"
    - ".pipeline/"
  always_propose_before_apply: true
