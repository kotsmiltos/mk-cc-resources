# essense-flow pipeline configuration
# Copied to .pipeline/config.yaml during project init
schema_version: 1

pipeline:
  name: ""                           # Project name (set during init)
  created_at: ""                     # ISO-8601 timestamp (set during init)

token_budgets:
  brief_ceiling: 12000              # Max tokens for any assembled agent brief
  section_max: 4000                 # Max tokens for any single brief section
  identity_max: 200                 # Max tokens for identity block
  constraints_max: 500              # Max tokens for constraints block
  injection_ceiling: 10000          # Max tokens for context hook injection
  safety_margin_pct: 10             # Buffer percentage subtracted from ceilings
  max_brief_ceiling: 100000         # Hard cap on adaptive brief scaling

timeouts:
  hook_ms: 5000                     # Max milliseconds for any hook script
  agent_ms: 300000                  # Max milliseconds for any subagent (5 min)

overflow:
  file_lines_backstop: 300          # File size backstop in lines (secondary signal)
  max_decomposition_depth: 5        # Max recursive decomposition before escalation

verify:
  items_per_group: 5                 # Max items per agent group in a verify pass
  elicit_loop_max: 3                 # Max verify-to-elicit cycles before escalation
  file_inline_token_threshold: 2000  # Files below this threshold are inlined in full
  file_excerpt_token_threshold: 8000 # Files above this threshold are excerpted only

quorum:
  research: "all"                   # All perspective agents required
  architecture_perspective: "n-1"   # Tolerate one missing perspective
  architecture_decomposition: "all" # All decomposition agents required
  build: "all"                      # All build agents required
  review: "n-1"                     # Tolerate one missing review angle
  verify: "all"                     # All verify agents required

retry:
  max_per_agent: 1                    # Max retries per agent before marking terminal
  allow_partial_synthesis: true       # Proceed with gaps when quorum is met

validation:
  yaml_validate_paths:              # Paths to validate on write (D6)
    - ".pipeline/"
    - "context/"

# Autopilot — read by the essense-autopilot plugin (separate plugin, install
# from the marketplace if you want it). Drives the pipeline through phases
# without you having to type between steps. Halts at human gates, blockers,
# iteration cap, and the configured context threshold.
#
# Default: disabled. Set enabled: true to opt in per project.
autopilot:
  enabled: false                    # Off by default. Flip to true to autopilot this project.
  human_gates:                      # Phases requiring human dialogue/decision
    - idle
    - eliciting
    - verifying
  terminal:                         # Pipeline-done phases
    - complete
  max_iterations: 30                # Stuck-loop safety: halt after this many same-phase advances
  context_threshold_pct: 60         # Halt if estimated context usage exceeds this %
  flow:                             # Phase → command. Canonical: references/phase-command-map.yaml. Override per project.
    research: /triage
    triaging: /triage
    requirements-ready: /architect
    architecture: /architect
    decomposing: /architect
    sprinting: /build
    sprint-complete: /review
    reviewing: /review
