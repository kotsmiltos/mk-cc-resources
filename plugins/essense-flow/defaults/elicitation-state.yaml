status: "active"                       # active | paused | complete | abandoned
current_round: 0
started_at: ""                         # ISO-8601
last_updated: ""                       # ISO-8601
seed: ""                               # Original user pitch

explored: {}                           # Living map: area_name -> depth_level
  # Example:
  # combat_system: "detailed"
  # shop_mechanics: "surface"
  # currency: "unexplored"             # Discovered but not yet explored

deferred: []                           # Items explicitly deferred by user
