# Initial pipeline state — written to .pipeline/state.yaml on /init.
# lib/state.js validates every write against references/transitions.yaml.

schema_version: 1
phase: idle
sprint: null
# sprint_iteration: positive-int counter for re-runs of the SAME sprint
# number (e.g. fix-only follow-up passes). Defaults null; bumped by a CLI
# op when a fix-only re-run starts on the same sprint.
sprint_iteration: null
wave: null
elicitation:
  round: 0
  started_at: null
  completed_at: null
research:
  round: 0
  completed_at: null
triage:
  completed_at: null
architecture:
  completed_at: null
  # Round budget — escalate after two amendment rounds:
  # `round` tracks architecture-phase round count (incremented by
  # architect-round-close write op). `escalation_signoff` is null by
  # default; user must populate it (verdict quote) to authorize round 3+.
  # state-force-set-phase --value architecture (or decomposing) refuses
  # round 3+ with EXIT_ALIGNMENT_DRIFT (19) when escalation_signoff is
  # null / undefined / empty string.
  round: 0
  escalation_signoff: null
decomposition:
  round: 0
verify:
  completed_at: null

# --- Runner-managed state fields (halt-recovery + sprint-complete ops) ---
# Runtime-emitted by halt-recovery + sprint-complete CLI ops; absent values default to null per YAML semantics.
sprint_complete_at: null
sprint_summary: null
known_open_concerns: null
halt_resolution-history: null
halted_on_drift: null
halt_resolution: null
halt_reason: null
last_updated: null
