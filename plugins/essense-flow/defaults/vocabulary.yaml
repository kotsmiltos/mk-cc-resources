# Vocabulary for entity normalization during synthesis
# Format: canonical_term -> { aliases: [variant1, variant2, ...] }
# Used by buildNormalizer() in lib/synthesis.js
#
# Canonical terms are lowercased automatically.
# Aliases match case-insensitively and with punctuation stripped.
# Fuzzy matching (Levenshtein distance) catches typos within threshold.
#
# Example:
#   Authentication:
#     aliases:
#       - auth
#       - login
#       - sign-in
#       - signin
#
# Optional config:
# _config:
#   fuzzy_threshold: 2     # Max Levenshtein distance (default: 2)

schema_version: 1
