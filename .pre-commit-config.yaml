repos:
  - repo: local
    hooks:
      - id: enforce-amendment-protocol
        name: Enforce amendment protocol
        entry: python scripts/enforce_amendment_protocol.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        description: >
          Blocks commits that change code-like files without a corresponding
          amendment record staged in the same commit.
