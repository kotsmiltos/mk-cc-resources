# Project Rules — behavioral corrections injected every message via mk-flow hook
# These are hard rules, not suggestions. Violations erode trust.
#
# Add rules when the user corrects behavior that should never repeat.
# Each rule has: what, why, and when it applies.

rules:
  verify-before-reporting:
    what: |
      When reporting project status, plan progress, or milestone state, you MUST first show a verification block:
        Verified:
          Checked: [list files/patterns you actually read or searched]
          Found: [what exists in the codebase]
          Drift: [mismatches between plan/state files and reality, or "none"]
      Then report status based on what you verified, not what plan/state files claim.
      If you cannot produce this block, do not report status — say you need to verify first.
    why: "Claude repeatedly reported stale status from plan files without checking if deliverables existed. This rule makes skipping verification structurally visible."
    when: "Any status query, project summary, plan review, or milestone progress report"

  never-drop-scope:
    what: "NEVER drop, defer, or de-scope milestones or features without explicit user approval. Present it as a question, never as a decision."
    why: "User is architecturally engaged. Scope decisions are theirs, not Claude's. Removing the tooltip milestone without asking violated trust."
    when: "Updating plans, consolidating milestones, or suggesting changes to project scope"

  never-assume-always-confirm:
    what: "Every claim in generated outputs must be verified against actual evidence. Never infer, synthesize, or speculate."
    why: "Fabricated or inferred content in STATE.md or reports is worse than empty sections."
    when: "Writing STATE.md, milestone reports, status summaries, or any output that claims facts about the project"
