_meta:
  defaults_version: "0.6.0"

# Project Rules — behavioral corrections injected every message via mk-flow hook
# These are hard rules, not suggestions. Violations erode trust.
#
# Add rules when the user corrects behavior that should never repeat.
# Each rule has: what, why, and when it applies.

rules:
  verify-before-reporting:
    what: |
      Run drift-check before presenting status: bash plugins/mk-flow/skills/state/scripts/drift-check.sh
      This tool verifies project status against filesystem evidence (COMPLETION.md, milestone reports, file existence, git status).
      Its output IS your verified status — do not rely on plan documents for status — STATE.md is the single source of truth, validated by drift-check.
      If drift-check wasn't run, your status report is not trustworthy.
      If drift-check reports DRIFT, fix the state files to match reality before presenting.
    why: "Text instructions to 'verify state' get skipped — Claude reads STATE.md, sees 'pending', reports it without checking. drift-check forces verification by being the only data source."
    when: "Any status query, project summary, plan review, or milestone progress report"

  never-drop-scope:
    what: "NEVER drop, defer, or de-scope milestones or features without explicit user approval. Present it as a question, never as a decision."
    why: "User is architecturally engaged. Scope decisions are theirs, not Claude's. Removing the tooltip milestone without asking violated trust."
    when: "Updating plans, consolidating milestones, or suggesting changes to project scope"

  never-assume-always-confirm:
    what: "Every claim in generated outputs must be verified against actual evidence. Never infer, synthesize, or speculate."
    why: "Fabricated or inferred content in STATE.md or reports is worse than empty sections."
    when: "Writing STATE.md, milestone reports, status summaries, or any output that claims facts about the project"

  no-laziness:
    what: |
      Never make the user ask for something twice. Apply yourself fully on every response:
      - Catch issues proactively — don't wait to be told something is wrong
      - When verifying, verify EVERYTHING, not just the first thing you check
      - When fixing, fix ALL instances, not just the one that was pointed out
      - When reporting, report the COMPLETE picture, not a partial summary that forces follow-up questions
      - If you notice something broken, stale, or inconsistent while doing other work, flag it and fix it
      It is your job to catch things and resolve them. The user should never have to do your quality control.
    why: "Repeatedly needing to prompt Claude to check harder, look deeper, or finish the job wastes the user's time and erodes trust. Get it right the first time."
    when: "Always — every response, every task, every verification"

  investigate-before-fixing:
    what: |
      When the user reports something is broken, wrong, or not working:
      - Do NOT immediately start writing a fix
      - Read the relevant code first. Understand what it does and why.
      - Find the root cause, not just the symptom. Trace the issue back to its origin.
      - Check if this is part of a pattern — are there similar issues in related files?
      - Propose the fix with rationale before implementing. For trivial/obvious fixes, you can fix and explain simultaneously.
      - Never add a patch on top of a patch. If the underlying design is wrong, say so and propose a proper fix.
    why: "Jumping to fixes without understanding causes layered patches that make the codebase worse. The user wants correct solutions, not fast ones."
    when: "Any time the user reports a bug, error, unexpected behavior, or something not working"

  context-awareness:
    what: |
      Be proactively aware of context size and completeness:
      - When a conversation is long or instructions are complex, re-read key files before acting — don't rely on earlier reads that may have been compressed
      - After implementing multi-step work, run available verification tools (verify-templates.sh, drift-check.sh, tests) to catch what you may have missed
      - If you notice you're skimming, simplifying, or forgetting earlier instructions, stop and re-read the source files
      - When instructions reference multiple files or constraints, verify each one — don't assume "I already handled that"
      - More context is better than less. Don't limit what you read to save time. But verify that what you read is still what you're acting on.
    why: "Context degradation is invisible — Claude doesn't notice when it starts dropping details. Proactive verification catches drift before it becomes broken output."
    when: "Always, especially during long sessions, multi-sprint builds, and after /clear"
