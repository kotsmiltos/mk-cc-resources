# Cross-References — "change X, also check Y"
# Updated automatically when Claude misses a related file and the user corrects it.
#
# These trigger CHECKS, not automatic changes. "Check" means verify
# consistency — only modify if actually broken by the original change.
#
# Format:
#   rule-name:
#     when: "what kind of change triggers this check"
#     check: "file pattern or list of files to verify"
#     why: "what could break if you don't check"
#
# Be specific about WHEN — "changing the format" is different from
# "bumping a version number." Vague triggers cause unnecessary cascading.

rules:
  plugin-json-format:
    when: "Changing the FORMAT or STRUCTURE of any plugin.json (adding/removing fields)"
    check: "All plugins/*/.claude-plugin/plugin.json"
    why: "All plugins must use the same metadata format"
    note: "The root .claude-plugin/plugin.json (mk-cc-all) has additional fields (homepage, repository, license, keywords) for distribution. Child plugin.json files use only name, version, description, author."

  skill-md-convention:
    when: "Changing SKILL.md section structure (adding/removing XML tags, changing frontmatter fields)"
    check: "All plugins/*/skills/*/SKILL.md"
    why: "Shared convention across all skills"

  marketplace-registry:
    when: "Adding, removing, or renaming a plugin in plugins/"
    check: ".claude-plugin/marketplace.json"
    why: "Registry must list every plugin"


  workflow-routing:
    when: "Adding a workflow .md file to a skill"
    check: "The skill's SKILL.md <routing> section"
    why: "Routing table must reference the new workflow"

  mk-flow-hook-context:
    when: "Adding a new context file type that mk-flow should read (like vocabulary.yaml, rules.yaml)"
    check: "plugins/mk-flow/hooks/intent-inject.sh"
    why: "Hook script must read and inject the new file type"

  mk-flow-init-context:
    when: "Adding a new context file type that mk-flow should create during init"
    check: "plugins/mk-flow/skills/mk-flow-init/SKILL.md"
    why: "Init must know to create the new file"

  build-plan-milestones:
    when: "Completing a milestone or changing milestone status"
    check: "context/STATE.md"
    why: "Build plan milestone structure and project state must reference the same work items"


  plugin-version-bump:
    when: "Changing any file inside a plugin (hooks, skills, defaults, scripts)"
    check: "The plugin's .claude-plugin/plugin.json version field"
    why: "Plugin system compares version numbers to detect updates. Without a bump, users get 'already at latest version' and never receive the changes."

  architect-template-workflow-sync:
    when: "Changing section structure in an architect template (plan.md, task-spec.md, audit-report.md)"
    check: "All plugins/architect/skills/architect/workflows/*.md that reference the changed template"
    why: "Workflows instruct Claude to generate content matching template structure. If the template adds or removes sections, workflows must reference them correctly."

  architect-agent-prompts:
    when: "Changing team-culture.md operating principles or the agent prompt inclusion block"
    check: "All plugins/architect/skills/architect/workflows/*.md agent prompt sections"
    why: "Every agent prompt includes the team values block from team-culture.md. If principles change, all prompts must stay consistent."

  pipeline-handoff-contracts:
    when: "Changing the output format of miltiaze requirements-report.md or architect task-spec.md template"
    check:
      - "plugins/architect/skills/architect/workflows/plan.md — reads miltiaze output"
      - "plugins/ladder-build/skills/ladder-build/workflows/execute.md — reads architect task specs"
    why: "Pipeline skills read each other's output. If the output format changes, downstream consumers must be updated."

  pipeline-routing:
    when: "Adding a new pipeline stage or changing stage names in STATE.md Pipeline Position"
    check: "plugins/mk-flow/hooks/intent-inject.sh — pipeline-aware routing instructions"
    why: "Hook routing instructions reference specific stage names. New stages need routing rules."

  miltiaze-requirements-template:
    when: "Changing requirements-report.md template sections"
    check: "plugins/miltiaze/skills/miltiaze/workflows/requirements.md"
    why: "Requirements workflow assembles output matching the template. Section changes must be reflected in the workflow steps."

  stage-names:
    when: "Adding, removing, or renaming a pipeline stage name"
    check:
      - "plugins/mk-flow/hooks/intent-inject.sh — routing conditions"
      - "plugins/mk-flow/skills/state/templates/state.md — canonical stage enum"
      - "plugins/architect/skills/architect/SKILL.md — routing guidance"
      - "plugins/ladder-build/skills/ladder-build/SKILL.md — routing guidance"
      - "plugins/miltiaze/skills/miltiaze/workflows/requirements.md — sets stage"
      - "plugins/architect/skills/architect/workflows/plan.md — sets stage"
      - "plugins/architect/skills/architect/workflows/review.md — sets stage"
      - "plugins/ladder-build/skills/ladder-build/workflows/execute.md — sets stage"
    why: "Stage names are a distributed constant — all consumers must agree on exact strings"

  metadata-format:
    when: "Changing the metadata blockquote format (> **field:** value) in any template"
    check:
      - "All 10 pipeline templates — must use same format"
      - "plugins/mk-flow/skills/state/scripts/verify-templates.sh — FF-1, FF-18, FF-19 check metadata"
    why: "Metadata format is a pipeline-wide contract. Inconsistency breaks extraction."
    source: "workflow-clarity remediation, Decision #1"

  adversarial-sections:
    when: "Adding or changing adversarial/risk/failure section in any template"
    check:
      - "Decision #5 in workflow-clarity PLAN.md — contextual naming convention"
      - "plugins/mk-flow/skills/state/scripts/verify-templates.sh — FF-2 checks adversarial sections exist"
    why: "Section names are contextual per template type (exploration vs plan vs milestone). Using the wrong name breaks FF-2."
    source: "workflow-clarity remediation, Decision #5"

  routing-rules:
    when: "Adding or changing stage routing rules in intent-inject.sh"
    check:
      - "plugins/mk-flow/skills/state/templates/state.md — canonical stage list must include the new stage"
      - "plugins/mk-flow/skills/state/scripts/verify-templates.sh — FF-7 checks all stages have routing"
      - "plugins/mk-flow/skills/state/scripts/drift-check.sh — canonical stage consistency check"
    why: "Routing rules, canonical stage list, and drift-check must all agree on stage names."
    source: "workflow-clarity remediation, FF-7"

  schema-scout-versions:
    when: "Bumping schema-scout plugin.json or pyproject.toml version"
    check:
      - "plugins/schema-scout/.claude-plugin/plugin.json — plugin version"
      - "plugins/schema-scout/skills/schema-scout/tool/pyproject.toml — Python package version"
    note: "These versions are intentionally independent. Plugin version tracks the skill. pyproject.toml tracks the Python CLI package."
    why: "Prevents confusion about which version to bump and whether they should match"

  scope-template-reference-sync:
    when: "Changing section structure in any scope template (index.md, agent-brief-decompose.md, agent-brief-implement.md, decision-record.md, interface-contract.md, cross-cutting-pattern.md, consistency-check.md, system-map.md)"
    check:
      - "plugins/architect/skills/architect/references/scope-decomposition.md — references template structures"
      - "plugins/architect/skills/architect/workflows/scope-decompose.md — assembles briefs from templates"
    why: "Templates, reference, and workflow must agree on section names, required fields, and file structure. Sprint 2 QA caught 3 inconsistencies from this coupling."

  scope-decompose-workflow-consumers:
    when: "Changing the scope-decompose workflow output format (what files it produces, where it writes them)"
    check:
      - "plugins/ladder-build/skills/ladder-build/workflows/execute.md — reads scope/ leaf tasks"
      - "plugins/architect/skills/architect/workflows/review.md — reviews scope/ output"
      - "plugins/architect/skills/architect/templates/index.md — INDEX.md tracks scope/ files"
    why: "Downstream consumers read scope-decompose output. Format changes break the pipeline."

  scope-index-template:
    when: "Changing INDEX.md template fields or structure"
    check:
      - "plugins/architect/skills/architect/workflows/scope-decompose.md — reads and writes INDEX.md"
      - "plugins/miltiaze/skills/miltiaze/workflows/requirements.md — creates initial INDEX.md"
      - "plugins/ladder-build/skills/ladder-build/workflows/execute.md — reads INDEX.md for scope detection"
    why: "Three skills read/write INDEX.md. Field additions or renames break consumers."

  scope-agent-brief-format:
    when: "Changing agent brief YAML frontmatter fields or required XML sections"
    check:
      - "plugins/architect/skills/architect/workflows/scope-decompose.md — assembles and validates agent briefs"
      - "plugins/architect/skills/architect/templates/consistency-check.md — validates agent brief content"
      - "plugins/architect/skills/architect/references/scope-decomposition.md — lists required fields"
    why: "Brief format is validated at assembly, consistency check, and reference level. All three must agree."

  miltiaze-scope-output:
    when: "Changing miltiaze requirements workflow output path or format for scope mode"
    check:
      - "plugins/architect/skills/architect/workflows/scope-decompose.md — reads project-brief.agent.md at Level 0"
      - "plugins/architect/skills/architect/templates/index.md — INDEX.md File Inventory format"
    why: "miltiaze creates the brief that scope-decompose consumes. Path or format changes break the handoff."

  scope-stages:
    when: "Adding or changing scope-specific pipeline stages (scope-L0, scope-LN, etc.)"
    check:
      - "plugins/mk-flow/skills/state/templates/state.md — canonical stage list"
      - "plugins/architect/skills/architect/SKILL.md — routing by stage"
      - "plugins/architect/skills/architect/workflows/scope-decompose.md — sets scope stages"
      - "plugins/ladder-build/skills/ladder-build/SKILL.md — routing by stage"
    why: "Scope stages are referenced by routing in multiple skills. Adding or renaming breaks routing."
    note: "The existing stage-names rule covers general stage changes. This rule is specific to scope stage semantics."
